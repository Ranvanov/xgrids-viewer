<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XGrids LCC Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script src="lcc-0.5.5.umd.js"></script>

    <script>
        window.onload = () => {
            // Используем имя конструктора, которое мы определили ранее
            const LccViewer = window.LCC.LccViewer || (window.LCC.default && window.LCC.default.LccViewer);

            if (!LccViewer) {
                console.error("Ошибка: Библиотека LCC не загружена.");
                return;
            }

            const lccManager = new LccViewer({
                container: document.getElementById('viewer'),
                appId: 'tilda-test',
                appKey: 'test'
            });

            // Прямая ссылка на вашу папку в Netlify (обязательно со слешем в конце)
            const modelBaseUrl = "https://capable-crisp-77c17e.netlify.app/";

            // Загружаем основной файл. SDK сам найдет data.bin и прочее по этому же адресу.
            lccManager.loadLcc(modelBaseUrl + "meta.lcc").then(() => {
                console.log("Модель успешно загружена из Netlify!");
                
                // Устанавливаем камеру (координаты из вашего файла)
                if (lccManager.setCameraLookAt) {
                    lccManager.setCameraLookAt(-65, -30, 5);
                }
            }).catch(err => {
                console.error("Ошибка при загрузке модели:", err);
            });
        };
    </script>
</body>
</html>
