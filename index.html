<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XGrids LCC Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script src="lcc-0.5.5.umd.js"></script>

    <script>
        // Карта идентификаторов файлов с вашего Google Диска
        const driveFiles = {
            'meta.lcc': '1BN6XDgJleJa2tThXf4Oyb3guADVQF1Du',
            'data.bin': '1RpMXbry5IDuqmUrG_ju2VtijwZ4oR6ji',
            'index.bin': '1Fhl-6aCq99Ip4-stPLiKyplmmMPE4no9',
            'shcoef.bin': '1kAu_5zD6r5E-n2uhUtoBauqUG5UM9aeR',
            'collision.bin': '1tWtArFRfUsIaAa1WKiVRICqsavrkbqKg',
            'environment.bin': '1y32bDivHcjJrerIHhLCJvF-LmqtAGSLA'
        };

        const getDownloadUrl = (id) => `https://docs.google.com/uc?export=download&id=${id}`;

        window.onload = () => {
            // Инициализация менеджера
            const lccManager = new LCC.LccManager({
                container: document.getElementById('viewer'),
                appId: 'tilda-test',
                appKey: 'test-key'
            });

            // Подменяем стандартный метод загрузки, чтобы он понимал ссылки Google Drive
            const originalLoad = lccManager.loadLcc.bind(lccManager);
            
            // Загружаем основной файл метаданных
            const metaUrl = getDownloadUrl(driveFiles['meta.lcc']);
            
            lccManager.loadLcc(metaUrl).then(() => {
                console.log("Метаданные загружены. Начинается рендеринг...");
                // Фокусируемся на модели (координаты из вашего meta.lcc)
                lccManager.setCameraLookAt(-65, -30, 5);
            }).catch(err => {
                console.error("Ошибка загрузки модели:", err);
            });
        };
    </script>
</body>
</html>
