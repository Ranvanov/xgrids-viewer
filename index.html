<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XGrids LCC Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script src="lcc-0.5.5.umd.js"></script>

    <script>
        window.onload = () => {
            const LccViewer = window.LCC?.LccViewer || window.LCC?.default?.LccViewer;
            if (!LccViewer) return;

            const lccManager = new LccViewer({
                container: document.getElementById('viewer'),
                appId: 'tilda-test',
                appKey: 'test'
            });

            // ВНИМАНИЕ: Если вы знаете название папки, которую загружали на Netlify, 
            // добавьте его здесь, например: "название_папки/"
            const folderName = ""; 
            const netlifyUrl = "https://capable-crisp-77c17e.netlify.app/" + folderName;

            lccManager.loadLcc(netlifyUrl + "meta.lcc")
                .then(() => {
                    console.log("Успех!");
                    if (lccManager.setCameraLookAt) lccManager.setCameraLookAt(-65, -30, 5);
                })
                .catch(err => {
                    console.error("Файл не найден по адресу: " + netlifyUrl + "meta.lcc");
                });
        };
    </script>
</body>
</html>
