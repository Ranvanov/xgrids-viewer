<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XGrids LCC Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script src="lcc-0.5.5.umd.js"></script>

    <script>
        window.onload = () => {
            console.log("Запуск вьюера...");

            // 1. Проверка библиотеки
            const LccViewer = window.LCC?.LccViewer || window.LCC?.default?.LccViewer;

            if (!LccViewer) {
                console.error("Критическая ошибка: Библиотека LCC не найдена. Проверьте файл lcc-0.5.5.umd.js");
                return;
            }

            const lccManager = new LccViewer({
                container: document.getElementById('viewer'),
                appId: 'tilda-test',
                appKey: 'test'
            });

            // 2. Настройка пути к модели
            // Если вы загружали ПАПКУ на Netlify, проверьте, не нужно ли добавить её имя в конец ссылки
            const netlifyUrl = "https://capable-crisp-77c17e.netlify.app/";
            const metaPath = "meta.lcc"; 

            console.log("Попытка загрузки модели по адресу:", netlifyUrl + metaPath);

            // 3. Запуск загрузки
            lccManager.loadLcc(netlifyUrl + metaPath)
                .then(() => {
                    console.log("Ура! Модель успешно загружена.");
                    // Установка камеры в рабочую зону
                    if (lccManager.setCameraLookAt) {
                        lccManager.setCameraLookAt(-65, -30, 5);
                    }
                })
                .catch(err => {
                    console.error("Ошибка загрузки модели. Возможные причины:");
                    console.error("1. Файл meta.lcc не найден по ссылке (404)");
                    console.error("2. Проблема с CORS на стороне Netlify");
                    console.log("Детали ошибки:", err);
                });
        };
    </script>
</body>
</html>
