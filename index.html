<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XGrids LCC Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #496A97; font-family: sans-serif; }
        #viewer { width: 100vw; height: 100vh; }
        #loader { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div style="font-size: 24px; margin-bottom: 10px;">Загрузка модели</div>
        <div id="status">Подключение к Netlify...</div>
    </div>
    <div id="viewer"></div>

    <script src="lcc-0.5.5.umd.js"></script>

    <script>
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        window.onload = () => {
            // Проверка библиотеки
            const LccViewer = window.LCC?.LccViewer || (window.LCC?.default && window.LCC?.default.LccViewer);
            
            if (!LccViewer) {
                status.innerText = "Ошибка: библиотека не загружена";
                return;
            }

            const lccManager = new LccViewer({
                container: document.getElementById('viewer'),
                appId: 'tilda-test',
                appKey: 'test'
            });

            // НОВЫЙ АДРЕС NETLIFY
            const modelUrl = "https://grand-empanada-526e24.netlify.app/assets/meta.lcc";
            
            status.innerText = "Скачивание облака точек...";

            lccManager.loadLcc(modelUrl).then(() => {
                loader.style.display = 'none';
                console.log("Модель успешно отображена");
                if (lccManager.setCameraLookAt) {
                    lccManager.setCameraLookAt(-65, -30, 5);
                }
            }).catch(err => {
                status.innerText = "Ошибка загрузки данных. Проверьте консоль.";
                console.error("Детали:", err);
            });
        };
    </script>
</body>
</html>
