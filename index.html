<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XGrids LCC Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script src="lcc-0.5.5.umd.js"></script>

    <script>
        const driveFiles = {
            'meta.lcc': '1BN6XDgJleJa2tThXf4Oyb3guADVQF1Du',
            'data.bin': '1RpMXbry5IDuqmUrG_ju2VtijwZ4oR6ji',
            'index.bin': '1Fhl-6aCq99Ip4-stPLiKyplmmMPE4no9',
            'shcoef.bin': '1kAu_5zD6r5E-n2uhUtoBauqUG5UM9aeR',
            'collision.bin': '1tWtArFRfUsIaAa1WKiVRICqsavrkbqKg',
            'environment.bin': '1y32bDivHcjJrerIHhLCJvF-LmqtAGSLA',
            'attrs.lcp': '1dEYSXmC0kyGfV8ZMu0fHr1YhjYsvYkYR',
            'collision.lci': '1PTE9fcWvGtLmZfxi1gSl5-jd4LfD4S46'
        };

        const proxy = 'https://cors-anywhere.herokuapp.com/';
        const getUrl = (fileName) => {
            const id = driveFiles[fileName];
            return id ? proxy + `https://docs.google.com/uc?export=download&id=${id}` : fileName;
        };

        window.onload = () => {
            // ВЫВОДИМ В КОНСОЛЬ ВСЁ СОДЕРЖИМОЕ LCC ДЛЯ ПРОВЕРКИ
            console.log("Содержимое объекта LCC:", window.LCC);

            // Ищем конструктор более агрессивно
            let LccManager;
            
            if (typeof window.LCC === 'function') {
                LccManager = window.LCC;
            } else if (window.LCC) {
                // Проверяем все возможные варианты имен в этой версии SDK
                LccManager = window.LCC.LccManager || 
                             window.LCC.Viewer || 
                             window.LCC.LccViewer || 
                             (window.LCC.default && window.LCC.default.LccManager) ||
                             window.LCC.default;
            }

            if (!LccManager) {
                console.error("Критическая ошибка: Конструктор не найден. Доступные ключи:", Object.keys(window.LCC || {}));
                return;
            }

            try {
                const lccManager = new LccManager({
                    container: document.getElementById('viewer'),
                    appId: 'tilda-test',
                    appKey: 'test'
                });

                // Обработка запросов к Google Drive
                lccManager.onBeforeRequest = (url) => {
                    const fileName = url.split('/').pop().split('?')[0];
                    if (driveFiles[fileName]) {
                        return getUrl(fileName);
                    }
                    return url;
                };

                const metaUrl = getUrl('meta.lcc');
                lccManager.loadLcc(metaUrl).then(() => {
                    console.log("Модель загружена!");
                    // Фокус на центр (из вашего файла meta.lcc)
                    if (lccManager.setCameraLookAt) lccManager.setCameraLookAt(-65, -30, 5);
                }).catch(err => console.error("Ошибка загрузки данных:", err));

            } catch (e) {
                console.error("Ошибка инициализации:", e);
            }
        };
    </script>
</body>
</html>
